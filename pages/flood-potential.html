<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Disaster Oliver 新聞位置與淹水潛勢圖整合頁">
  <title>新聞淹水潛勢 | Disaster Oliver</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="flood-potential">
  <header class="site-header">
    <a class="brand" href="../index.html" aria-label="Disaster Oliver 首頁">
      <span class="brand-mark">DO</span>
      <span class="brand-text">Disaster Oliver</span>
    </a>
    <nav class="site-nav" aria-label="主要導覽">
      <a href="news.html">最新災情新聞</a>
      <a href="news-map.html">新聞事件地圖</a>
      <a href="flood-potential.html">新聞淹水潛勢</a>
      <a href="../index.html#dashboard">Dashboard</a>
    </nav>
  </header>

  <main>
    <section class="page-hero flood-page-hero" aria-labelledby="flood-title">
      <p class="eyebrow">Flood Potential Overlay</p>
      <h1 id="flood-title">新聞位置 × 淹水潛勢圖</h1>
      <p>
        讀取 Google Sheet 中已定位的新聞點位，並疊合淹水潛勢示意圖層。此頁面先建立正式操作介面，未來可替換為水利署、ArcGIS 或 WMS 圖資。
      </p>
    </section>

    <section class="flood-workspace" aria-label="新聞淹水潛勢工作區">
      <aside class="flood-side-panel">
        <div class="section-heading">
          <p class="eyebrow">Located News</p>
          <h2>新聞點位</h2>
        </div>

        <div class="flood-controls">
          <label class="field">
            <span>搜尋</span>
            <input id="flood-search" type="search" placeholder="輸入縣市、行政區、來源或關鍵字">
          </label>
          <label class="check-field">
            <input id="flood-layer-toggle" type="checkbox" checked>
            <span>顯示淹水潛勢示意圖層</span>
          </label>
          <button class="button button-primary" id="flood-refresh" type="button">重新讀取</button>
        </div>

        <div class="flood-summary">
          <div class="metric">
            <span>Located</span>
            <strong id="flood-count">--</strong>
          </div>
          <div class="metric">
            <span>Status</span>
            <strong id="flood-status">Loading</strong>
          </div>
        </div>

        <div id="flood-news-list" class="flood-news-list" aria-live="polite"></div>
      </aside>

      <section class="flood-map-panel" aria-label="新聞與淹水潛勢地圖">
        <div id="flood-map" class="flood-map"></div>
        <div class="flood-legend" aria-label="淹水潛勢圖例">
          <strong>淹水潛勢示意</strong>
          <span><i class="risk-low"></i>低</span>
          <span><i class="risk-mid"></i>中</span>
          <span><i class="risk-high"></i>高</span>
        </div>
      </section>
    </section>
  </main>

  <footer class="site-footer">
    <span>Disaster Oliver</span>
    <span>新聞位置與淹水潛勢整合</span>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="../js/flood-potential.js"></script>
</body>
</html>
