<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Disaster Oliver 災後復原情資地圖，用於呈現道路清理進度。">
  <title>災後復原情資地圖 | Disaster Oliver</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/leaflet.fullscreen.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/recovery.css">
</head>
<body data-page="recovery-map">
  <header class="site-header">
    <a class="brand" href="../index.html" aria-label="Disaster Oliver 首頁">
      <span class="brand-mark">DO</span>
      <span class="brand-text">Disaster Oliver</span>
    </a>
    <nav class="site-nav" aria-label="主要導覽">
      <a href="news.html">最新新聞</a>
      <a href="news-map.html">新聞地圖</a>
      <a href="flood-potential.html">淹水潛勢</a>
      <a href="recovery-map.html" aria-current="page">災後復原情資地圖</a>
      <a href="../index.html#dashboard">儀表板</a>
    </nav>
  </header>

  <main class="recovery-main">
    <section class="recovery-header" aria-labelledby="recovery-title">
      <div>
        <p class="eyebrow">災後復原情資地圖</p>
        <h1 id="recovery-title">颱風後道路清理進度</h1>
      </div>
      <div class="recovery-meta">
        <span>資料來源：北水處支援情形統計表</span>
        <strong id="recovery-last-update">113-11-03 15:30</strong>
      </div>
    </section>

    <section class="recovery-workspace" aria-label="災後復原地圖工作區">
      <section class="recovery-map-panel" aria-label="道路清理 GIS 地圖">
        <div id="recovery-map" class="recovery-map"></div>
        <div class="recovery-legend" aria-label="道路狀態圖例">
          <strong>道路狀態</strong>
          <span><i class="status-completed"></i>已完成</span>
          <span><i class="status-progress"></i>處理中</span>
          <span><i class="status-not-started"></i>未開始</span>
        </div>
      </section>

      <aside class="recovery-dashboard" aria-label="復原進度儀表板">
        <section class="dashboard-card selected-road-card">
          <p class="eyebrow">選取路段</p>
          <h2 id="selected-road-name">請選取路段</h2>
          <dl id="selected-road-detail" class="road-detail-list">
            <div><dt>權責單位</dt><dd>--</dd></div>
            <div><dt>狀態</dt><dd>--</dd></div>
            <div><dt>完成度</dt><dd>--</dd></div>
            <div><dt>預計完成</dt><dd>--</dd></div>
            <div><dt>更新時間</dt><dd>--</dd></div>
            <div><dt>備註</dt><dd>--</dd></div>
          </dl>
        </section>

        <section class="dashboard-card">
          <div class="panel-title-row">
            <div>
              <p class="eyebrow">統計摘要</p>
              <h2>復原進度</h2>
            </div>
            <strong id="summary-total">0</strong>
          </div>
          <div class="summary-grid">
            <article><span>已完成</span><strong id="summary-completed">0</strong></article>
            <article><span>處理中</span><strong id="summary-progress">0</strong></article>
            <article><span>未開始</span><strong id="summary-not-started">0</strong></article>
          </div>
          <div class="progress-block">
            <div class="progress-label">
              <span>完成率</span>
              <strong id="summary-rate">0%</strong>
            </div>
            <div class="progress-track"><span id="summary-bar"></span></div>
          </div>
          <div class="eta-row">
            <span>預估完成時間</span>
            <strong id="summary-eta">--</strong>
          </div>
        </section>

        <section class="dashboard-card layer-card">
          <p class="eyebrow">圖層管理</p>
          <div id="layer-status-list" class="layer-status-list"></div>
        </section>
      </aside>
    </section>

    <section class="recovery-timeline" aria-label="復原進度時間軸">
      <div class="timeline-title">
        <p class="eyebrow">時間軸</p>
        <h2>預留回放功能</h2>
      </div>
      <div id="recovery-timeline-track" class="recovery-timeline-track"></div>
    </section>
  </main>

  <footer class="site-footer">
    <span>Disaster Oliver</span>
    <span>災後復原情資地圖</span>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/Leaflet.fullscreen.min.js"></script>
  <script type="module" src="../js/recovery/recovery.js"></script>
</body>
</html>
