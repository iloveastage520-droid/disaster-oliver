<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>累積雨量粒子測試</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #0f172a;
    }
    #map { position: absolute; inset: 0; }
    #rain-canvas,
    #rain-effect-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #rain-canvas {
      z-index: 520;
      mix-blend-mode: screen;
    }
    #rain-effect-canvas {
      z-index: 530;
      mix-blend-mode: screen;
      opacity: 0.58;
    }
    .panel {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 1000;
      width: min(430px, calc(100vw - 32px));
      color: #0f172a;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.28);
      padding: 12px;
    }
    .panel h1 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
    }
    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      border: 0;
      border-radius: 4px;
      background: #0891b2;
      color: #fff;
      padding: 7px 11px;
      font-weight: 800;
      cursor: pointer;
    }
    button.active { background: #0e7490; }
    input[type="range"] {
      width: 100%;
      accent-color: #0891b2;
    }
    .status {
      margin-top: 8px;
      font-size: 13px;
      color: #334155;
    }
    .legend {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 3px;
      margin-top: 10px;
      font-size: 11px;
      color: #334155;
    }
    .legend span {
      height: 8px;
      border-radius: 999px;
    }
    .station-label {
      display: grid;
      grid-template-columns: 18px auto;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      filter: drop-shadow(0 2px 5px rgba(15, 23, 42, 0.4));
    }
    .station-rank {
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      color: #fff;
      background: #dc2626;
      border: 2px solid #fff;
      font-size: 11px;
      font-weight: 900;
    }
    .station-value {
      padding: 3px 6px;
      border-radius: 4px;
      color: #111827;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(15, 23, 42, 0.18);
      font-size: 12px;
      font-weight: 900;
    }
    .station-label.top-three .station-rank {
      background: #7c3aed;
    }
    @media (max-width: 720px) {
      .panel {
        left: 10px;
        top: 10px;
      }
    }
  </style>
</head>

    function resizeCanvas(canvas, ctx) {
      const size = map.getSize();
      const dpr = window.devicePixelRatio || 1;
      const nextWidth = Math.max(1, Math.floor(size.x * dpr));
      const nextHeight = Math.max(1, Math.floor(size.y * dpr));
      if (canvas.width !== nextWidth || canvas.height !== nextHeight) {
        canvas.width = nextWidth;
        canvas.height = nextHeight;
      }
      canvas.style.width = `${size.x}px`;
      canvas.style.height = `${size.y}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return size;
    }

    function resetRainDrops() {
      rainDrops = [];
      lastRainEffectAt = 0;
      resizeCanvas(rainEffectCanvas, rainEffectCtx);
      rainEffectCtx.clearRect(0, 0, rainEffectCanvas.width, rainEffectCanvas.height);
    }

    function typhoonBandWeight(cell, size) {
      const timelineMax = Math.max(1, maxTimeIndex());
      const timelineProgress = Math.max(0, Math.min(1, timeIndex / timelineMax));
      const westProgress = 1 - Math.max(0, Math.min(1, cell.x / Math.max(1, size.x)));
      const bandCenter = 0.18 + timelineProgress * 0.72;
      const bandDistance = Math.abs(westProgress - bandCenter);
      const bandWeight = Math.exp(-Math.pow(bandDistance / 0.28, 2));
      const rainWeight = Math.max(0.18, Math.min(1, cell.amount / 180));
      return rainWeight * (0.35 + bandWeight * 0.95);
    }

    function sampleRainCell(size) {
      if (!rainField.length) return null;
      let fallback = null;
      let fallbackScore = -1;
      for (let attempt = 0; attempt < 18; attempt++) {
        const cell = rainField[Math.floor(Math.random() * rainField.length)];
        if (!cell) continue;
        const score = typhoonBandWeight(cell, size);
        if (score > fallbackScore) {
          fallback = cell;
          fallbackScore = score;
        }
        if (Math.random() < score) return cell;
      }
      return fallback || rainField[Math.floor(Math.random() * rainField.length)];
    }

    function createRainDrop(size) {
      const cell = sampleRainCell(size);
      if (!cell) return null;
      const intensity = Math.max(0, Math.min(1, cell.amount / 240));
      const bandPush = typhoonBandWeight(cell, size);
      return {
        x: cell.minX + Math.random() * cell.grid,
        y: cell.minY - Math.random() * 80,
        len: 8 + intensity * 12 + Math.random() * 8,
        speed: 150 + intensity * 230 + bandPush * 90 + Math.random() * 100,
        alpha: 0.07 + intensity * 0.13 + bandPush * 0.06,
        drift: -30 + bandPush * -22 + Math.random() * 14,
        size
      };
    }

    function targetRainDropCount() {
      if (!rainVisible || !rainField.length) return 0;
      const total = rainField.reduce((sum, cell) => sum + Math.min(1, cell.amount / 220), 0);
      return Math.min(150, Math.max(32, Math.round(total / 16)));
    }

    function drawRainEffect(now) {
      const size = resizeCanvas(rainEffectCanvas, rainEffectCtx);
      const dt = lastRainEffectAt ? Math.min(0.05, (now - lastRainEffectAt) / 1000) : 0.016;
      lastRainEffectAt = now;
      rainEffectCtx.clearRect(0, 0, size.x, size.y);

      const targetCount = targetRainDropCount();
      while (rainDrops.length < targetCount) {
        const drop = createRainDrop(size);
        if (!drop) break;
        rainDrops.push(drop);
      }
      if (rainDrops.length > targetCount) rainDrops.length = targetCount;

      rainEffectCtx.save();
      clipToTaiwanMask(rainEffectCtx);
      rainEffectCtx.lineCap = "round";
      for (const drop of rainDrops) {
        drop.x += drop.drift * dt;
        drop.y += drop.speed * dt;
        if (drop.y > size.y + drop.len || drop.x < -40) {
          const nextDrop = createRainDrop(size);
          if (nextDrop) Object.assign(drop, nextDrop);
        }
        rainEffectCtx.strokeStyle = `rgba(210, 240, 255, ${drop.alpha})`;
        rainEffectCtx.lineWidth = 1;
        rainEffectCtx.beginPath();
        rainEffectCtx.moveTo(drop.x, drop.y);
        rainEffectCtx.lineTo(drop.x + drop.drift * 0.035, drop.y + drop.len);
        rainEffectCtx.stroke();
      }
      rainEffectCtx.restore();

      rainEffectFrameId = requestAnimationFrame(drawRainEffect);
    }

    function startRainEffect() {
      if (rainEffectFrameId) return;
      rainEffectCanvas.style.display = "block";
      lastRainEffectAt = 0;
      rainEffectFrameId = requestAnimationFrame(drawRainEffect);
    }

    function stopRainEffect() {
      if (rainEffectFrameId) cancelAnimationFrame(rainEffectFrameId);
      rainEffectFrameId = 0;
      rainDrops = [];
      rainEffectCtx.clearRect(0, 0, rainEffectCanvas.width, rainEffectCanvas.height);
      rainEffectCanvas.style.display = "none";
    }

    function distanceKm(lat1, lng1, lat2, lng2) {
      const meanLat = ((lat1 + lat2) / 2) * Math.PI / 180;
      const dx = (lng1 - lng2) * Math.cos(meanLat) * 111;
      const dy = (lat1 - lat2) * 111;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function activeRainStationsAt(index = timeIndex) {
      if (liveRainTimeline.length) {
        const safeIndex = Math.max(0, Math.min(liveRainTimeline.length - 1, Number(index) || 0));
        return liveRainTimeline[safeIndex].stations;
      }
      return liveRainStations;
    }

    function activeTimeLabel(index = timeIndex) {
      if (liveRainTimeline.length) {
        const safeIndex = Math.max(0, Math.min(liveRainTimeline.length - 1, Number(index) || 0));
        return liveRainTimeline[safeIndex].label;
      }
      return timeSteps[Math.max(0, Math.min(timeSteps.length - 1, index))].label;
    }

    function maxTimeIndex() {
      return (liveRainTimeline.length || timeSteps.length) - 1;
    }

    function stationFieldRainfallAt(lat, lng, stations) {
      if (!stations.length) return 0;
      let amount = 0;
      for (const station of stations) {
        const stationAmount = Number(station.amount) || 0;
        const dist = distanceKm(lat, lng, station.lat, station.lng);
        const radius = Math.max(20, Math.min(42, 18 + stationAmount * 0.08));
        amount += stationAmount * Math.exp(-Math.pow(dist / radius, 2));
      }
      return Math.min(360, amount);
    }

    function rainfallAt(lat, lng, untilIndex = timeIndex) {
      const stations = activeRainStationsAt(untilIndex);
      if (stations.length) return stationFieldRainfallAt(lat, lng, stations);

      let amount = 0;
      for (let stepIndex = 0; stepIndex <= untilIndex; stepIndex++) {
        const step = timeSteps[stepIndex];
        for (let centerIndex = 0; centerIndex < rainfallCenters.length; centerIndex++) {
          const center = rainfallCenters[centerIndex];
          const centerLat = center.lat + step.driftLat;
          const centerLng = center.lng + step.driftLng;
          const dx = (lng - centerLng) * Math.cos(lat * Math.PI / 180);
          const dy = lat - centerLat;
          const dist = Math.sqrt(dx * dx + dy * dy);
          amount += center.amount * step.weights[centerIndex] * 0.18 * Math.exp(-Math.pow(dist / center.radius, 2));
        }
      }
      return Math.min(360, amount);
    }

    function pointInRing(lat, lng, ring) {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const [latI, lngI] = ring[i];
        const [latJ, lngJ] = ring[j];
        const crosses = (lngI > lng) !== (lngJ > lng);
        const latAtLng = ((latJ - latI) * (lng - lngI)) / (lngJ - lngI) + latI;
        if (crosses && lat < latAtLng) inside = !inside;
      }
      return inside;
    }

    function isInsideTaiwan(lat, lng) {
      return taiwanMaskRings.some((ring) => pointInRing(lat, lng, ring));
    }

    function clipToTaiwanMask(ctx) {
      ctx.beginPath();
      for (const ring of taiwanMaskRings) {
        ring.forEach(([lat, lng], index) => {
          const point = map.latLngToContainerPoint([lat, lng]);
          if (index === 0) {
            ctx.moveTo(point.x, point.y);
          } else {
            ctx.lineTo(point.x, point.y);
          }
        });
        ctx.closePath();
      }
      ctx.clip();
    }

    function colorForRain(amount) {
      if (amount >= 300) return [168, 85, 247, 0.68];
      if (amount >= 220) return [239, 68, 68, 0.62];
      if (amount >= 150) return [249, 115, 22, 0.56];
      if (amount >= 80) return [234, 179, 8, 0.48];
      if (amount >= 30) return [34, 197, 94, 0.36];
      if (amount >= 8) return [56, 189, 248, 0.26];
      return [0, 0, 0, 0];
    }

    function stationRainAmount(station, fromIndex = timeIndex, toIndex = timeIndex, progress = 1) {
      if (station.isLive) return Number(station.amount) || 0;
      const easedProgress = 1 - Math.pow(1 - Math.max(0, Math.min(1, progress)), 2.4);
      const fromAmount = rainfallAt(station.lat, station.lng, fromIndex);
      const toAmount = rainfallAt(station.lat, station.lng, toIndex);
      return fromAmount + (toAmount - fromAmount) * easedProgress;
    }

    function normalizeLiveRainStation(item, index) {
      const lat = Number(item.lat);
      const lng = Number(item.lng);
      const amount = Number(item.rain ?? item.rainfall_24h_mm ?? item.amount);
      if (!Number.isFinite(lat) || !Number.isFinite(lng) || !Number.isFinite(amount)) return null;
      return {
        isLive: true,
        rank: Number(item.rank) || index + 1,
        name: String(item.name || item.station || "雨量站"),
        county: String(item.county || ""),
        lat,
        lng,
        amount,
        observedAt: String(item.observed_at || item.fetched_at || "")
      };
    }

    function buildRainTimeline(items) {
      const grouped = new Map();
      for (const item of items) {
        const station = normalizeLiveRainStation(item, Number(item.rank) - 1);
        if (!station) continue;
        const key = String(item.snapshot_ms || item.snapshot_time || item.fetched_at || station.observedAt);
        if (!grouped.has(key)) {
          grouped.set(key, {
            key,
            label: String(item.snapshot_time || item.fetched_at || station.observedAt || key),
            timestamp: Number(item.snapshot_ms) || Date.parse(item.snapshot_time || station.observedAt) || 0,
            stations: []
          });
        }
        grouped.get(key).stations.push(station);
      }

      return Array.from(grouped.values())
        .map((snapshot) => ({
          ...snapshot,
          stations: snapshot.stations
            .sort((a, b) => b.amount - a.amount)
            .slice(0, 20)
            .map((station, index) => ({ ...station, rank: index + 1 }))
        }))
        .filter((snapshot) => snapshot.stations.length)
        .sort((a, b) => a.timestamp - b.timestamp);
    }

    async function loadLiveRainStations() {
      try {
        const [latestResponse, historyResponse] = await Promise.all([
          fetch(`${rainfallStationApiUrl}&t=${Date.now()}`, { cache: "no-store" }),
          fetch(`${rainfallHistoryApiUrl}&t=${Date.now()}`, { cache: "no-store" })
        ]);
        if (!latestResponse.ok) throw new Error(`latest HTTP ${latestResponse.status}`);
        const payload = await latestResponse.json();
        const items = Array.isArray(payload.items) ? payload.items : [];
        liveRainStations = items
          .map(normalizeLiveRainStation)
          .filter(Boolean)
          .sort((a, b) => b.amount - a.amount)
          .slice(0, 20);

        if (historyResponse.ok) {
          const historyPayload = await historyResponse.json();
          if (historyPayload.ok && Array.isArray(historyPayload.items)) {
            liveRainTimeline = buildRainTimeline(historyPayload.items);
          }
        }

        if (liveRainTimeline.length) {
          timeSlider.max = String(liveRainTimeline.length - 1);
          stationSourceLabel = `氣象署歷史雨量站 ${liveRainTimeline.length} 期`;
          setTimeIndex(liveRainTimeline.length - 1, false);
        } else if (liveRainStations.length) {
          timeSlider.max = "0";
          stationSourceLabel = "氣象署雨量站";
          setTimeIndex(0, false);
        }
        updateTopStations(timeIndex, timeIndex, 1);
      } catch (error) {
        stationSourceLabel = "模擬雨量站";
        console.warn("Rainfall station API failed, using fallback stations.", error);
      }
    }

    function updateTopStations(fromIndex = timeIndex, toIndex = timeIndex, progress = 1) {
      stationLayer.clearLayers();
      if (!rainVisible) return;
      const activeStations = activeRainStationsAt(toIndex);
      const sourceStations = activeStations.length ? activeStations : rainStations;
      const topStations = sourceStations
        .map((station) => ({
          ...station,
          amount: stationRainAmount(station, fromIndex, toIndex, progress)
        }))
        .filter((station) => station.amount >= 8)
        .sort((a, b) => b.amount - a.amount)
        .slice(0, 10);

      for (const [index, station] of topStations.entries()) {
        const rank = index + 1;
        const icon = L.divIcon({
          className: "",
          html: `<div class="station-label${rank <= 3 ? " top-three" : ""}"><span class="station-rank">${rank}</span><span class="station-value">${Math.round(station.amount)}mm</span></div>`,
          iconSize: [74, 24],
          iconAnchor: [9, 12]
        });
        L.marker([station.lat, station.lng], { icon, interactive: true, zIndexOffset: 900 + (10 - rank) })
          .bindTooltip(`${rank}. ${station.county}${station.name} ${Math.round(station.amount)}mm${station.observedAt ? ` (${station.observedAt})` : ""}`, {
            direction: "top",
            offset: [0, -10]
          })
          .addTo(stationLayer);
      }
    }

    function rebuildRainField(fromIndex = timeIndex, toIndex = timeIndex, progress = 1) {
      const size = resizeCanvas(rainCanvas, rainCtx);
      const grid = 10;
      const cols = Math.ceil(size.x / grid) + 2;
      const rows = Math.ceil(size.y / grid) + 2;
      rainField = [];
      rainCtx.clearRect(0, 0, size.x, size.y);
      rainCtx.globalCompositeOperation = "source-over";
      const easedProgress = 1 - Math.pow(1 - Math.max(0, Math.min(1, progress)), 2.4);
      const sandEdge = 0.18;

      rainCtx.save();
      clipToTaiwanMask(rainCtx);
      for (let y = -1; y < rows; y++) {
        for (let x = -1; x < cols; x++) {
          const px = x * grid;
          const py = y * grid;
          const latlng = map.containerPointToLatLng([px + grid / 2, py + grid / 2]);
          if (!isInsideTaiwan(latlng.lat, latlng.lng)) continue;
          const fromAmount = rainfallAt(latlng.lat, latlng.lng, fromIndex);
          const toAmount = rainfallAt(latlng.lat, latlng.lng, toIndex);
          const currentAmount = Math.max(0, toAmount - fromAmount);
          const jitter = (((x * 37 + y * 91 + toIndex * 53) % 100) / 100 - 0.5) * sandEdge;
          const localProgress = Math.max(0, Math.min(1, easedProgress + jitter));
          const amount = fromAmount + (toAmount - fromAmount) * localProgress;
          const [r, g, b, alpha] = colorForRain(amount);
          if (!alpha) continue;
          const fillAlpha = Math.min(0.6, alpha + 0.08 + localProgress * 0.08);
          rainCtx.fillStyle = `rgba(${r}, ${g}, ${b}, ${fillAlpha})`;
          rainCtx.fillRect(px, py, grid, grid);
          if (currentAmount > 4 && localProgress > 0 && localProgress < 0.98) {
            const grainAlpha = Math.min(0.45, 0.12 + currentAmount / 260);
            rainCtx.fillStyle = `rgba(255, 255, 255, ${grainAlpha})`;
            rainCtx.fillRect(px + grid * 0.35, py + grid * 0.35, Math.max(1, grid * 0.28), Math.max(1, grid * 0.28));
          }
          rainCtx.strokeStyle = "rgba(255, 255, 255, 0.07)";
          rainCtx.lineWidth = 0.4;
          rainCtx.strokeRect(px + 0.5, py + 0.5, grid - 1, grid - 1);
          rainField.push({
            x: px + grid / 2,
            y: py + grid / 2,
            minX: px,
            maxX: px + grid,
            minY: py,
            maxY: py + grid,
            amount,
            currentAmount,
            grid
          });
        }
      }
      rainCtx.restore();

      status.textContent = `累積雨量：${activeTimeLabel(timeIndex)} / ${rainField.length} 格 / ${stationSourceLabel}`;
      updateTopStations(fromIndex, toIndex, progress);
    }

    function animateBuildup(fromIndex, toIndex, duration = 1050) {
      if (buildupFrameId) cancelAnimationFrame(buildupFrameId);
      buildupFromIndex = fromIndex;
      buildupToIndex = toIndex;
      const startedAt = performance.now();
      function frame(now) {
        buildupProgress = Math.min(1, (now - startedAt) / duration);
        rebuildRainField(buildupFromIndex, buildupToIndex, buildupProgress);
        if (buildupProgress < 1) {
          buildupFrameId = requestAnimationFrame(frame);
        } else {
          buildupFrameId = 0;
        }
      }
      buildupFrameId = requestAnimationFrame(frame);
    }

    function scheduleRainFieldRebuild() {
      if (rebuildFrameId) return;
      rebuildFrameId = requestAnimationFrame(() => {
        rebuildFrameId = 0;
        if (buildupFrameId) {
          rebuildRainField(buildupFromIndex, buildupToIndex, buildupProgress);
        } else {
          rebuildRainField(timeIndex, timeIndex, 1);
        }
      });
    }

    function setTimeIndex(index, animate = true) {
      const nextIndex = Math.max(0, Math.min(maxTimeIndex(), Number(index) || 0));
      const previousIndex = timeIndex;
      timeIndex = nextIndex;
      timeSlider.value = String(timeIndex);
      resetRainDrops();
      if (animate && previousIndex !== timeIndex && timeIndex > previousIndex) {
        animateBuildup(previousIndex, timeIndex);
      } else {
        if (buildupFrameId) cancelAnimationFrame(buildupFrameId);
        buildupFrameId = 0;
        rebuildRainField(timeIndex, timeIndex, 1);
      }
    }

    function toggleRainLayer() {
      rainVisible = !rainVisible;
      rainCanvas.style.display = rainVisible ? "block" : "none";
      rainEffectCanvas.style.display = rainVisible ? "block" : "none";
      rainCloseButton.textContent = rainVisible ? "關閉雨量" : "顯示雨量";
      if (rainVisible) {
        rebuildRainField(timeIndex, timeIndex, 1);
        startRainEffect();
        if (!map.hasLayer(stationLayer)) stationLayer.addTo(map);
        status.textContent = `累積雨量：${activeTimeLabel(timeIndex)} / ${rainField.length} 格 / ${stationSourceLabel}`;
      } else {
        stopTimePlayback();
        stopRainEffect();
        stationLayer.clearLayers();
        status.textContent = "累積雨量已關閉";
      }
    }

    function stopTimePlayback() {
      if (timeTimer) {
        clearInterval(timeTimer);
        timeTimer = null;
      }
      timePlayButton.classList.remove("active");
      timePlayButton.textContent = "播放時序";
    }

    function startTimePlayback() {
      if (!rainVisible) toggleRainLayer();
      stopTimePlayback();
      timePlayButton.classList.add("active");
      timePlayButton.textContent = "暫停時序";
      timeTimer = setInterval(() => {
        const nextIndex = (timeIndex + 1) % (maxTimeIndex() + 1);
        setTimeIndex(nextIndex, nextIndex > timeIndex);
      }, 1250);
    }

    function toggleTimePlayback() {
      if (timeTimer) {
        stopTimePlayback();
      } else {
        startTimePlayback();
      }
    }

    map.on("move zoom resize", scheduleRainFieldRebuild);
    map.on("moveend zoomend", () => {
      if (rebuildFrameId) cancelAnimationFrame(rebuildFrameId);
      rebuildFrameId = 0;
      rebuildRainField(timeIndex, timeIndex, 1);
      resetRainDrops();
    });
    timePlayButton.addEventListener("click", toggleTimePlayback);
    rainCloseButton.addEventListener("click", toggleRainLayer);
    timeSlider.addEventListener("input", () => {
      stopTimePlayback();
      if (!rainVisible) toggleRainLayer();
      setTimeIndex(timeSlider.value);
    });
    rebuildRainField(timeIndex, timeIndex, 1);
    startRainEffect();
    loadLiveRainStations();
  </script>
</body>
</html>
