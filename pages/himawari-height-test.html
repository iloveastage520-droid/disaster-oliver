<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>向日葵雲頂高度感測試</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #0f172a;
    }
    #map { position: absolute; inset: 0; }
    .panel {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 1000;
      width: min(430px, calc(100vw - 32px));
      color: #0f172a;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.28);
      padding: 12px;
    }
    .panel h1 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
    }
    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      border: 0;
      border-radius: 4px;
      background: #0891b2;
      color: #fff;
      padding: 6px 10px;
      font-weight: 800;
      cursor: pointer;
    }
    button.active { background: #0e7490; }
    input[type="range"] {
      width: 100%;
      accent-color: #0891b2;
    }
    .status {
      margin-top: 8px;
      font-size: 13px;
      color: #334155;
    }
    .note {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.55;
      color: #475569;
    }
    .legend {
      position: fixed;
      right: 16px;
      bottom: 18px;
      z-index: 1000;
      width: min(330px, calc(100vw - 32px));
      color: #0f172a;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.28);
      padding: 10px 12px;
      font-size: 12px;
    }
    .legend-title {
      font-weight: 900;
      margin-bottom: 7px;
    }
    .bar {
      height: 14px;
      border-radius: 3px;
      background: linear-gradient(90deg, #1f2937 0%, #64748b 22%, #e5e7eb 44%, #38bdf8 62%, #7c3aed 80%, #ef4444 100%);
      border: 1px solid rgba(15, 23, 42, 0.22);
    }
    .ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      color: #475569;
    }
    .leaflet-tile-pane .himawari-ir {
      mix-blend-mode: screen;
      filter: contrast(2.05) brightness(1.04) saturate(1.65) drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.65));
      transition: opacity 0.22s linear, filter 0.25s linear;
    }
    .leaflet-tile-pane .himawari-vapor {
      mix-blend-mode: screen;
      filter: contrast(2.15) brightness(1.05) saturate(1.9) hue-rotate(190deg) drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.5));
      transition: opacity 0.22s linear, filter 0.25s linear;
    }
    .leaflet-tile-pane .himawari-ir,
    .leaflet-tile-pane .himawari-vapor {
      transition: opacity 0.22s linear, filter 0.25s linear;
    }
    @media (max-width: 720px) {
      .panel {
        left: 10px;
        top: 10px;
      }
      .legend {
        left: 10px;
        right: 10px;
        bottom: 12px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <section class="panel">
    <h1>向日葵雲頂高度感測試</h1>
    <div class="controls">
      <button id="play" type="button">播放</button>
      <input id="timeline" type="range" min="0" max="0" value="0" step="1" aria-label="向日葵時間軸">
      <button id="latest" type="button">最新</button>
    </div>
    <div id="status" class="status">載入向日葵時間序列中...</div>
    <div class="note">
      這頁用紅外線亮溫加水氣影像做「高度感」測試：雲頂越冷通常越高，水氣疊層用來增加厚雲和高層雲的層次。這不是正式雲頂高度數值圖層。
    </div>
  </section>
  <aside class="legend">
    <div class="legend-title">概念色階：雲頂溫度與厚度感</div>
    <div class="bar"></div>
    <div class="ticks">
      <span>暖 / 低雲</span>
      <span>冷 / 高雲</span>
      <span>深對流</span>
    </div>
  </aside>
  <script>
    const timesUrl = "https://www.jma.go.jp/bosai/himawari/data/satimg/targetTimes_fd.json";
    const map = L.map("map", { center: [23.8, 121.1], zoom: 5, zoomControl: true });
    L.tileLayer("https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}", {
      maxZoom: 20,
      attribution: "Map imagery &copy; Google"
    }).addTo(map);

    let frames = [];
    let frameIndex = 0;
    let timer = null;
    let playRequestId = 0;
    const channels = {};
    const status = document.getElementById("status");
    const timeline = document.getElementById("timeline");
    const play = document.getElementById("play");
    const latest = document.getElementById("latest");

    function parseJmaTime(value) {
      const match = String(value || "").match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})$/);
      if (!match) return NaN;
      return Date.UTC(
        Number(match[1]),
        Number(match[2]) - 1,
        Number(match[3]),
        Number(match[4]),
        Number(match[5]),
        Number(match[6])
      );
    }
    function formatTime(frame) {
      return new Date(frame.epoch).toLocaleString("zh-TW", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }
    function tileUrl(frame, product) {
      return `https://www.jma.go.jp/bosai/himawari/data/satimg/${frame.basetime}/fd/${frame.validtime}/${product}/{z}/{x}/{y}.jpg`;
    }
    function createLayer(frame, product, className, opacity, zIndex) {
      return L.tileLayer(tileUrl(frame, product), {
        opacity,
        className,
        attribution: "Himawari &copy; JMA",
        minZoom: 3,
        maxZoom: 11,
        maxNativeZoom: 5,
        zIndex
      });
    }
    function createChannel(name, product, className, opacity, zIndex, frame) {
      const layers = [
        createLayer(frame, product, className, opacity, zIndex).addTo(map),
        createLayer(frame, product, className, 0, zIndex).addTo(map)
      ];
      channels[name] = { product, layers, activeSlot: 0, opacity };
    }
    function updateChannel(name, frame) {
      const channel = channels[name];
      const nextIndex = channel.activeSlot ? 0 : 1;
      const currentLayer = channel.layers[channel.activeSlot];
      const nextLayer = channel.layers[nextIndex];
      nextLayer.setOpacity(0);
      nextLayer.setUrl(tileUrl(frame, channel.product));
      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        nextLayer.setOpacity(channel.opacity);
        currentLayer.setOpacity(0);
        channel.activeSlot = nextIndex;
      };
      nextLayer.once("load", finish);
      window.setTimeout(finish, 260);
    }
    function preloadImage(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = resolve;
        img.onerror = resolve;
        img.src = url;
      });
    }
    function preloadFrame(index) {
      if (!frames.length) return Promise.resolve();
      const frame = frames[(index + frames.length) % frames.length];
      const tiles = [
        ["5", "26", "13"],
        ["5", "27", "13"],
        ["5", "28", "13"],
        ["5", "26", "14"],
        ["5", "27", "14"],
        ["5", "28", "14"]
      ];
      const requests = [];
      ["B13/TBB", "B08/TBB"].forEach((product) => {
        tiles.forEach(([z, x, y]) => {
          requests.push(preloadImage(tileUrl(frame, product).replace("{z}", z).replace("{x}", x).replace("{y}", y)));
        });
      });
      return Promise.all(requests);
    }
    function preloadUpcomingFrames(count = 5) {
      const requests = [];
      for (let offset = 1; offset <= count; offset++) {
        requests.push(preloadFrame(frameIndex + offset));
      }
      const timeout = new Promise((resolve) => window.setTimeout(resolve, 2000));
      return Promise.race([Promise.all(requests), timeout]);
    }
    function setFrame(index) {
      if (!frames.length) return;
      frameIndex = Math.max(0, Math.min(frames.length - 1, index));
      const frame = frames[frameIndex];
      timeline.value = String(frameIndex);
      updateChannel("ir", frame);
      updateChannel("vapor", frame);
      status.textContent = `紅外線亮溫：${formatTime(frame)} (${frameIndex + 1}/${frames.length})`;
      preloadFrame(frameIndex + 1);
    }
    function stop() {
      playRequestId += 1;
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      play.classList.remove("active");
      play.textContent = "播放";
    }
    async function togglePlay() {
      if (!frames.length) return;
      if (timer) {
        stop();
        return;
      }
      const requestId = playRequestId + 1;
      playRequestId = requestId;
      play.disabled = true;
      play.textContent = "預載中";
      status.textContent = "預載接下來 5 格影像中...";
      await preloadUpcomingFrames(5);
      if (playRequestId !== requestId) return;
      play.disabled = false;
      play.classList.add("active");
      play.textContent = "暫停";
      timer = setInterval(() => {
        setFrame((frameIndex + 1) % frames.length);
      }, 360);
    }
    async function init() {
      const response = await fetch(timesUrl, { cache: "no-store" });
      const times = await response.json();
      frames = (Array.isArray(times) ? times : [])
        .map((frame) => ({ ...frame, epoch: parseJmaTime(frame.validtime) }))
        .filter((frame) => frame.basetime && frame.validtime && Number.isFinite(frame.epoch));
      if (!frames.length) {
        status.textContent = "向日葵資料目前無法載入";
        return;
      }
      frameIndex = frames.length - 1;
      timeline.min = "0";
      timeline.max = String(frames.length - 1);
      timeline.value = String(frameIndex);
      createChannel("ir", "B13/TBB", "himawari-ir", 0.7, 620, frames[frameIndex]);
      createChannel("vapor", "B08/TBB", "himawari-vapor", 0.3, 621, frames[frameIndex]);
      status.textContent = `紅外線亮溫：${formatTime(frames[frameIndex])} (${frameIndex + 1}/${frames.length})`;
    }
    timeline.addEventListener("input", () => setFrame(Number(timeline.value)));
    play.addEventListener("click", togglePlay);
    latest.addEventListener("click", () => {
      stop();
      setFrame(frames.length - 1);
    });
    init().catch((error) => {
      console.error(error);
      status.textContent = "向日葵資料載入失敗";
    });
  </script>
</body>
</html>
