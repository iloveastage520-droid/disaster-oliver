                        1H：${rain1h} mm<br>
                        24H：${rain24h} mm
                      `)
                      .addTo(liveAllRainStationsLayer);
                });
            } catch (error) {
                console.warn("Rain station layer unavailable", error);
            }
        }
        function replaceLiveSidebar(items) {
            const newsList = document.querySelector(".news-list");
            const timelineTrack = document.querySelector(".timeline-track");
            const summary = document.querySelector(".summary");
            if (summary) summary.textContent = `來源：Google Sheet。目前顯示 ${items.length} 則；全部 ${liveSheetAllItems.length || items.length} 則新聞。`;
            if (newsList) {
                if (items.length) {
                    renderLiveContextPanel(items[0]);
                    renderRainStationMarker(items[0]);
                } else {
                    newsList.innerHTML = '<p class="empty-state">這個日期篩選目前沒有新聞。</p>';
                    if (liveRainStationLayer) liveRainStationLayer.clearLayers();
                }
            }
            if (timelineTrack) {
                timelineTrack.innerHTML = items.map((item) => `
                    <button class="timeline-item ${liveNewsAge(item).className}" data-news-id="${item.id}" onclick="focusNews('${item.id}')" style="--source-color: ${item.color}">
                        <span class="timeline-dot"></span>
                        <span class="timeline-time">${liveEscape(liveNewsAge(item).label)} / ${liveEscape(item.published_at)}</span>
                        <span class="timeline-source">${liveEscape(item.source)}</span>
                        <span class="timeline-title">${liveEscape(item.title)}</span>
                        <span class="timeline-districts">${liveEscape([item.matched_county, item.matched_district].filter(Boolean).join(" "))}</span>
                    </button>
                `).join("");
            }
        }
        function clearStaticNewsUi() {
            const newsList = document.querySelector(".news-list");
            const timelineTrack = document.querySelector(".timeline-track");
            const cctvGrid = document.querySelector(".cctv-grid");
            const summary = document.querySelector(".summary");
            if (summary) summary.textContent = "正在讀取 Google Sheet...";
            if (newsList) newsList.innerHTML = "";
            if (timelineTrack) timelineTrack.innerHTML = "";
            if (cctvGrid) cctvGrid.innerHTML = "";
        }
        function clearStaticMarkers(map) {
            const toRemove = [];
            map.eachLayer((layer) => {
                if (layer instanceof L.Marker || layer instanceof L.GeoJSON) toRemove.push(layer);
            });
            toRemove.forEach((layer) => map.removeLayer(layer));
        }
        function livePointKey(point) {
            return `${Number(point[0]).toFixed(5)},${Number(point[1]).toFixed(5)}`;
        }
        function spreadLivePoint(point, index) {
            if (!index) return point;
            const angle = (index - 1) * 0.85;
            const radius = 0.0009 + Math.floor((index - 1) / 8) * 0.00035;
            return [
                point[0] + Math.sin(angle) * radius,
                point[1] + Math.cos(angle) * radius
            ];
        }
        function renderNewsLayerItems(map, items) {
            if (liveSheetLayer) map.removeLayer(liveSheetLayer);
            if (liveRainStationLayer) liveRainStationLayer.clearLayers();
            liveSheetLayer = L.layerGroup().addTo(map);
            liveSheetFocusPoints = {};
            liveSheetMarkers = {};
            liveSheetItems = {};
            const seenPointCounts = {};
            items.forEach((item) => {
                liveSheetFocusPoints[item.id] = item.point;
                liveSheetItems[item.id] = item;
                const pointKey = livePointKey(item.point);
                const duplicateIndex = seenPointCounts[pointKey] || 0;
                seenPointCounts[pointKey] = duplicateIndex + 1;
                const markerPoint = spreadLivePoint(item.point, duplicateIndex);
                const age = liveNewsAge(item);
                const markerSource = shortSourceName(item.source);
                const popup = `
                    <b>${liveEscape(item.source)}</b><br>
                    ${liveEscape(item.published_at)}<br>
                    <b>${liveEscape(item.title)}</b><br>
                    <a href="${liveEscape(item.link)}" target="_blank">閱讀新聞</a><hr>
                    ${liveEscape([item.matched_county, item.matched_district].filter(Boolean).join(" "))}<br>
                    ${item.point[0]}, ${item.point[1]}
                `;
                const marker = L.marker(markerPoint, {
                    icon: L.divIcon({
                        html: `<div class="news-marker news-location-marker ${age.className}" title="${liveEscape(item.source)} / ${liveEscape(age.label)}" style="background:${item.color}"><span class="news-marker-source">${liveEscape(markerSource)}</span></div>`,
                        iconSize: [64, 28],
                        iconAnchor: [32, 14]
                    })
                }).bindTooltip(`${item.id}. ${item.source} / ${item.title}`).bindPopup(popup).addTo(liveSheetLayer);
                liveSheetMarkers[item.id] = marker;
            });
        }
        function wireFocusNews() {
            window.focusNews = function(newsId) {
                const item = liveSheetItems[newsId] || liveSheetAllItems.find((candidate) => candidate.id === newsId);
                if (!item) return;
                setActiveNewsItem(newsId);
                renderLiveContextPanel(item);
                renderRainStationMarker(item);
                const point = liveSheetFocusPoints[newsId] || item.point;
                const marker = liveSheetMarkers[newsId];
                const map = currentLeafletMap();
                if (map && point) {
                    const zoom = window.matchMedia("(max-width: 820px)").matches ? 12 : 13;
                    map.setView(point, zoom);
                    refreshMapAfterPanelMove(map);
                    if (marker) setTimeout(() => marker.openPopup(), 140);
                }
            };
        }
        function tvEventIcon(event) {
            return L.divIcon({
                className: "tv-ai-event-marker",
                html: `<div class="tv-ai-event-pin" title="東森新聞 AI 辨識"><span>AI</span></div>`,
                iconSize: [38, 42],
                iconAnchor: [19, 34]
            });
        }
        function ensureTvEventLegend() {
            if (document.querySelector(".tv-ai-event-legend")) return;
            const legend = document.createElement("div");
            legend.className = "tv-ai-event-legend";
            legend.innerHTML = "<i></i><span>TV AI 事件</span>";
            document.body.append(legend);
        }
        function removeTvEventLegend() {
            document.querySelector(".tv-ai-event-legend")?.remove();
        }
        async function loadTvEventLayer(map) {
            try {
                if (!tvEventVisible) {
                    if (tvEventLayer) map.removeLayer(tvEventLayer);
                    removeTvEventLegend();
                    return;
                }
                let response;
                try {
                    response = await fetch(`${tvEventDataUrl}?cacheBust=${Date.now()}`);
                } catch (error) {
                    response = await fetch(`https://disaster-oliver.pages.dev/data/tv-monitor/tv-events.json?cacheBust=${Date.now()}`);
                }
                if (!response.ok) {
                    response = await fetch(`https://disaster-oliver.pages.dev/data/tv-monitor/tv-events.json?cacheBust=${Date.now()}`);
                }
                if (!response.ok) throw new Error(`Cannot load ${tvEventDataUrl}`);
                const payload = await response.json();
                const events = (payload.events || []).filter((event) => Number.isFinite(event.lat) && Number.isFinite(event.lng));
                if (tvEventLayer) map.removeLayer(tvEventLayer);
                tvEventLayer = L.layerGroup().addTo(map);
                if (events.length) ensureTvEventLegend();
                events.forEach((event) => {
                    const popup = `
                        <b>東森新聞 AI 辨識</b><br>
                        ${liveEscape(event.time || event.recorded_at || "")}<br>
                        <b>${liveEscape(event.title || event.event_type || "TV event")}</b><br>
                        ${liveEscape(event.location || "")}<br>
                        ${Number(event.lat).toFixed(4)}, ${Number(event.lng).toFixed(4)}
                        <hr>
                        ${event.photo ? `<img src="${liveEscape(event.photo)}" alt="" style="width:220px;max-width:100%;border-radius:6px;margin-bottom:6px;">` : ""}
                        <br><a href="tv-event-map.html" target="_blank" rel="noopener">開啟 TV AI 事件地圖</a>
                    `;
                    L.marker([event.lat, event.lng], { icon: tvEventIcon(event) })
                        .bindTooltip(`TV AI / ${event.location || event.event_type || event.title || ""}`)
                        .bindPopup(popup)
                        .addTo(tvEventLayer);
                });
            } catch (error) {
                console.error("TV event layer failed", error);
            }
        }
        function toggleTvEventLayer() {
            tvEventVisible = !tvEventVisible;
            const button = document.getElementById("tv-event-toggle");
            if (button) button.classList.toggle("active", tvEventVisible);
            const map = currentLeafletMap();
            if (!map) return;
            if (!tvEventVisible) {
                if (tvEventLayer) map.removeLayer(tvEventLayer);
                removeTvEventLegend();
                return;
            }
            loadTvEventLayer(map);
        }
        async function loadSheetNewsLayer(retryCount = 0) {
            const map = currentLeafletMap();
            if (!map) {
                if (retryCount < 20) setTimeout(() => loadSheetNewsLayer(retryCount + 1), 300);
                return;
            }
            clearStaticNewsUi();
            clearStaticMarkers(map);
            loadAllRainStationsLayer(map);
            loadTvEventLayer(map);
            loadTyphoonTrackLayer(map);
            const rows = await loadSheetRows();
            liveSheetAllItems = expandSheetRows(rows);
            if (!liveSheetAllItems.length) {
                const summary = document.querySelector(".summary");
                if (summary) summary.textContent = "Google Sheet 目前沒有 coordinate 可定位資料。";
                return;
            }
            wireFocusNews();
            setDateFilter(activeDateFilter);
        }
        bindDateFilters();
        syncSidebarToggle();
        setTimeout(loadSheetNewsLayer, 600);
    </script>
