<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>向日葵雲頂高度感測試</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #0f172a;
    }
    #map { position: absolute; inset: 0; }
    #himawari-canvas,
    #radar-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #himawari-canvas {
      z-index: 500;
      mix-blend-mode: screen;
      filter: contrast(2.05) brightness(1.05) saturate(1.7) drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.6));
      opacity: 0.88;
    }
    #radar-canvas {
      z-index: 650;
      opacity: 0.74;
    }
    .panel {
      position: fixed;
      left: 58px;
      top: 16px;
      z-index: 1000;
      width: min(430px, calc(100vw - 74px));
      color: #0f172a;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.28);
      padding: 12px;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .panel h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }
    .panel-toggle {
      flex: 0 0 auto;
      background: #0f172a;
      padding: 5px 9px;
      font-size: 13px;
    }
    .panel.collapsed {
      width: auto;
      min-width: 112px;
      padding: 8px 10px;
    }
    .panel.collapsed h1,
    .panel.collapsed .controls,
    .panel.collapsed .status {
      display: none;
    }
    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .tools {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      border: 0;
      border-radius: 4px;
      background: #0891b2;
      color: #fff;
      padding: 6px 10px;
      font-weight: 800;
      cursor: pointer;
    }
    button.active { background: #0e7490; }
    input[type="range"] {
      width: 100%;
      accent-color: #0891b2;
    }
    .status {
      margin-top: 8px;
      font-size: 13px;
      color: #334155;
    }
    .typhoon-center-marker {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: #dc2626;
      border: 2px solid #fff;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.4);
      font-weight: 900;
      font-size: 15px;
    }
    .typhoon-forecast-marker {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #f97316;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.35);
    }
    .typhoon-time-label {
      color: #7f1d1d;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(127, 29, 29, 0.22);
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.18);
      padding: 2px 5px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    @media (max-width: 720px) {
      .panel {
        left: 50px;
        top: 10px;
        width: min(430px, calc(100vw - 60px));
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <canvas id="himawari-canvas"></canvas>
  <canvas id="radar-canvas"></canvas>
  <section id="control-panel" class="panel">
    <div class="panel-header">
      <h1>向日葵雲頂高度感測試</h1>
      <button id="panel-toggle" class="panel-toggle" type="button">收合</button>
    </div>
    <div class="controls">
      <button id="play" type="button">播放雲圖</button>
      <input id="timeline" type="range" min="0" max="0" value="0" step="1" aria-label="向日葵時間軸">
    </div>
    <div class="controls">
      <button id="radar-play" type="button">播放回波</button>
      <input id="radar-timeline" type="range" min="0" max="0" value="0" step="1" aria-label="雷達時間軸" disabled>
    </div>
    <div class="controls">
      <button id="typhoon-play" type="button">播放颱風</button>
      <input id="typhoon-timeline" type="range" min="0" max="0" value="0" step="1" aria-label="颱風時間軸" disabled>
      <button id="typhoon-close" type="button">關閉颱風</button>
    </div>
    <div id="status" class="status">載入向日葵時間序列中...</div>
  </section>
  <script>
    const timesUrl = "https://www.jma.go.jp/bosai/himawari/data/satimg/targetTimes_fd.json";
    const typhoonTrackDataUrl = "../data/cwa-typhoon-track.geojson";
    const historyHours = 12;
    const map = L.map("map", { center: [23.8, 121.1], zoom: 5, zoomControl: true });
    L.tileLayer("https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}", {
      maxZoom: 20,
      attribution: "Map imagery &copy; Google"
    }).addTo(map);

    let frames = [];
    let frameIndex = 0;
    let timer = null;
    let playRequestId = 0;
    let renderRequestId = 0;
    const canvas = document.getElementById("himawari-canvas");
    const ctx = canvas.getContext("2d");
    const radarCanvas = document.getElementById("radar-canvas");
    const radarCtx = radarCanvas.getContext("2d");
    const tileZoom = 5;
    const frameCache = new Map();
    const status = document.getElementById("status");
    const controlPanel = document.getElementById("control-panel");
    const panelToggle = document.getElementById("panel-toggle");
    const timeline = document.getElementById("timeline");
    const play = document.getElementById("play");
    const radarPlay = document.getElementById("radar-play");
    const radarTimeline = document.getElementById("radar-timeline");
    const typhoonPlay = document.getElementById("typhoon-play");
    const typhoonTimeline = document.getElementById("typhoon-timeline");
    const typhoonClose = document.getElementById("typhoon-close");
    let radarVisible = false;
    let radarFrames = [];
    let radarFrameIndex = 0;
    let radarTimer = null;
    let radarHost = "";
    const radarCache = new Map();
    let typhoonTrackLayer = null;
    let typhoonPlaybackLayer = null;
    let typhoonFrames = [];
    let typhoonFrameIndex = 0;
    let typhoonTimer = null;

    function parseJmaTime(value) {
      const match = String(value || "").match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})$/);
      if (!match) return NaN;
      return Date.UTC(
        Number(match[1]),
        Number(match[2]) - 1,
        Number(match[3]),
        Number(match[4]),
        Number(match[5]),
        Number(match[6])
      );
    }
    function formatTime(frame) {
      return new Date(frame.epoch).toLocaleString("zh-TW", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }
    function formatRadarTime(epochSeconds) {
      return new Date(epochSeconds * 1000).toLocaleString("zh-TW", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }
    function typhoonPointIcon(feature) {
      if (feature?.properties?.kind === "current-center") {
        return L.divIcon({
          html: '<div class="typhoon-center-marker">颱</div>',
          iconSize: [30, 30],
          iconAnchor: [15, 15],
          popupAnchor: [0, -16],
          className: "empty"
        });
      }
      return L.divIcon({
        html: '<div class="typhoon-forecast-marker"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        popupAnchor: [0, -10],
        className: "empty"
      });
    }
    function typhoonStyle(feature) {
      const kind = feature?.properties?.kind || "";
      if (kind === "analysis-track") return { color: "#dc2626", weight: 3, opacity: 0.9 };
      if (kind === "forecast-track") return { color: "#fb923c", weight: 12, opacity: 0.22, lineCap: "round", lineJoin: "round" };
      if (kind.includes("25ms-circle")) return { color: "#7f1d1d", weight: 2, fillColor: "#7f1d1d", fillOpacity: 0.08 };
      if (kind.includes("15ms-circle")) return { color: "#dc2626", weight: 2, fillColor: "#dc2626", fillOpacity: 0.05 };
      if (kind === "forecast-70prob-circle") return { color: "#f97316", weight: 1, opacity: 0.35, fillColor: "#f97316", fillOpacity: 0.025, dashArray: "4,7" };
      return { color: "#f97316", weight: 2, opacity: 0.8 };
    }
    function showTyphoonStaticFeature(feature) {
      const kind = feature?.properties?.kind || "";
      return [
        "analysis-track",
        "forecast-track",
        "analysis-center",
        "current-center",
        "forecast-center",
        "current-15ms-circle",
        "current-25ms-circle",
        "forecast-70prob-circle"
      ].includes(kind);
    }
    function typhoonFeatureTimeLabel(feature) {
      const p = feature?.properties || {};
      const kind = p.kind || "";
      if (!["analysis-center", "current-center", "forecast-center"].includes(kind)) return "";
      if (p.forecastHour) {
        const date = new Date(p.initialTime || p.datetime || "");
        if (Number.isNaN(date.getTime())) return `${p.forecastHour}h`;
        date.setHours(date.getHours() + (Number(p.forecastHour) || 0));
        return `${date.toLocaleString("zh-TW", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })}`;
      }
      const date = new Date(p.datetime || "");
      if (Number.isNaN(date.getTime())) return p.datetime || "";
      return date.toLocaleString("zh-TW", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }
    function typhoonPopup(feature) {
      const p = feature.properties || {};
      return [
        `<b>${escapeHtml(p.label || p.name || "颱風資料")}</b>`,
        p.name || p.intlName ? `${escapeHtml(p.name || "")} ${escapeHtml(p.intlName || "")}` : "",
        p.datetime ? `時間：${escapeHtml(p.datetime)}` : "",
        p.forecastHour ? `預報：${escapeHtml(p.forecastHour)} 小時` : "",
        p.radius_km ? `半徑：${escapeHtml(p.radius_km)} km` : "",
        p.maxWindSpeed_ms ? `最大風速：${escapeHtml(p.maxWindSpeed_ms)} m/s` : "",
        p.pressure_hpa ? `中心氣壓：${escapeHtml(p.pressure_hpa)} hPa` : ""
      ].filter(Boolean).join("<br>");
    }
    function typhoonCircleMatchesFrame(circle, center) {
      const circleProps = circle.properties || {};
      const centerProps = center.properties || {};
      if (centerProps.forecastHour && circleProps.forecastHour) {
        return String(centerProps.forecastHour) === String(circleProps.forecastHour);
      }
      return Boolean(centerProps.datetime && circleProps.datetime && centerProps.datetime === circleProps.datetime);
    }
    function buildTyphoonFrames(geojson) {
      const centerKinds = new Set(["analysis-center", "current-center", "forecast-center"]);
      const circles = (geojson.features || []).filter((feature) => String(feature.properties?.kind || "").includes("circle"));
      typhoonFrames = (geojson.features || [])
        .filter((feature) => centerKinds.has(feature.properties?.kind) && feature.geometry?.type === "Point")
        .map((feature) => {
          const coords = feature.geometry.coordinates;
          return {
            point: [coords[1], coords[0]],
            properties: feature.properties || {},
            circles: circles.filter((circle) => typhoonCircleMatchesFrame(circle, feature))
          };
        })
        .filter((frame) => Number.isFinite(frame.point[0]) && Number.isFinite(frame.point[1]));
      typhoonFrameIndex = Math.max(0, typhoonFrames.findIndex((frame) => frame.properties.kind === "current-center"));
      typhoonTimeline.min = "0";
      typhoonTimeline.max = String(Math.max(0, typhoonFrames.length - 1));
      typhoonTimeline.value = String(typhoonFrameIndex);
      typhoonTimeline.disabled = !typhoonFrames.length;
    }
    function drawTyphoonFrame(index) {
      if (!typhoonFrames.length) return;
      typhoonFrameIndex = Math.max(0, Math.min(typhoonFrames.length - 1, index));
      typhoonTimeline.value = String(typhoonFrameIndex);
      if (!typhoonPlaybackLayer) typhoonPlaybackLayer = L.layerGroup().addTo(map);
      typhoonPlaybackLayer.clearLayers();
      const frame = typhoonFrames[typhoonFrameIndex];
      const path = typhoonFrames.slice(0, typhoonFrameIndex + 1).map((item) => item.point);
      L.polyline(path, { color: "#991b1b", weight: 4, opacity: 0.9 }).addTo(typhoonPlaybackLayer);
      frame.circles.forEach((circle) => {
        L.geoJSON(circle, {
          style: typhoonStyle,
          onEachFeature: (feature, layer) => layer.bindPopup(typhoonPopup(feature))
        }).addTo(typhoonPlaybackLayer);
      });
      L.circleMarker(frame.point, {
        radius: 9,
        color: "#ffffff",
        weight: 2,
        fillColor: frame.properties.kind === "forecast-center" ? "#f97316" : "#dc2626",
        fillOpacity: 0.95
      }).bindPopup(typhoonPopup({ properties: frame.properties })).addTo(typhoonPlaybackLayer);
    }
    function stopTyphoonPlayback() {
      if (typhoonTimer) {
        clearInterval(typhoonTimer);
        typhoonTimer = null;
      }
      typhoonPlay.classList.remove("active");
      typhoonPlay.textContent = "播放颱風";
    }
    async function loadTyphoonTrack() {
      if (typhoonTrackLayer) return;
      const response = await fetch(typhoonTrackDataUrl, { cache: "no-store" });
      if (!response.ok) throw new Error(`Typhoon HTTP ${response.status}`);
      const geojson = await response.json();
      buildTyphoonFrames(geojson);
      typhoonTrackLayer = L.geoJSON(geojson, {
        filter: showTyphoonStaticFeature,
        style: typhoonStyle,
        pointToLayer: (feature, latlng) => L.marker(latlng, {
          icon: typhoonPointIcon(feature),
          zIndexOffset: 1500
        }),
        onEachFeature: (feature, layer) => {
          layer.bindPopup(typhoonPopup(feature));
          const timeLabel = typhoonFeatureTimeLabel(feature);
          if (timeLabel && layer.bindTooltip) {
            layer.bindTooltip(timeLabel, {
              permanent: true,
              direction: "top",
              offset: [0, -6],
              className: "typhoon-time-label"
            });
          }
        }
      }).addTo(map);
      drawTyphoonFrame(typhoonFrameIndex);
    }
    async function toggleTyphoonPlayback() {
      try {
        await loadTyphoonTrack();
        if (typhoonTimer) {
          stopTyphoonPlayback();
          return;
        }
        typhoonPlay.classList.add("active");
        typhoonPlay.textContent = "暫停颱風";
        typhoonTimer = setInterval(() => drawTyphoonFrame((typhoonFrameIndex + 1) % typhoonFrames.length), 650);
      } catch (error) {
        console.error(error);
        status.textContent = "颱風路徑載入失敗";
      }
    }
    function closeTyphoonLayer() {
      stopTyphoonPlayback();
      if (typhoonTrackLayer && map.hasLayer(typhoonTrackLayer)) map.removeLayer(typhoonTrackLayer);
      if (typhoonPlaybackLayer && map.hasLayer(typhoonPlaybackLayer)) map.removeLayer(typhoonPlaybackLayer);
      typhoonTrackLayer = null;
      typhoonPlaybackLayer = null;
      status.textContent = "颱風路徑已關閉";
    }
    function radarTileUrl(frame, tile) {
      return `${radarHost}${frame.path}/256/${tile.z}/${tile.x}/${tile.y}/2/1_1.png`;
    }
    async function ensureRadarFrames() {
      if (radarFrames.length) return;
      const response = await fetch("https://api.rainviewer.com/public/weather-maps.json", { cache: "no-store" });
      const data = await response.json();
      radarFrames = (data.radar?.past || []).slice(-12);
      radarHost = data.host;
      radarFrameIndex = Math.max(0, radarFrames.length - 1);
      if (!radarFrames.length) throw new Error("No radar frame");
      radarTimeline.min = "0";
      radarTimeline.max = String(radarFrames.length - 1);
      radarTimeline.value = String(radarFrameIndex);
      radarTimeline.disabled = false;
    }
    function loadRadarTile(frame, tile) {
      const key = `${frame.time}:${tile.z}:${tile.x}:${tile.y}`;
      if (radarCache.has(key)) return Promise.resolve(radarCache.get(key));
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          radarCache.set(key, img);
          resolve(img);
        };
        img.onerror = () => resolve(null);
        img.src = radarTileUrl(frame, tile);
      });
    }
    async function renderRadarFrame(frame) {
      const offscreen = document.createElement("canvas");
      const { targetCtx } = sizeCanvas(offscreen);
      const tiles = visibleTiles();
      targetCtx.clearRect(0, 0, offscreen.width, offscreen.height);
      targetCtx.globalAlpha = 0.72;
      for (const tile of tiles) {
        const img = await loadRadarTile(frame, tile);
        if (!img) continue;
        const west = tileXToLng(tile.x, tile.z);
        const east = tileXToLng(tile.x + 1, tile.z);
        const north = tileYToLat(tile.y, tile.z);
        const south = tileYToLat(tile.y + 1, tile.z);
        const topLeft = map.latLngToContainerPoint([north, west]);
        const bottomRight = map.latLngToContainerPoint([south, east]);
        targetCtx.drawImage(img, topLeft.x, topLeft.y, bottomRight.x - topLeft.x, bottomRight.y - topLeft.y);
      }
      targetCtx.globalAlpha = 1;
      return offscreen;
    }
    async function drawRadarFrame(index) {
      if (!radarVisible || !radarFrames.length) return;
      radarFrameIndex = Math.max(0, Math.min(radarFrames.length - 1, index));
      const frame = radarFrames[radarFrameIndex];
      radarTimeline.value = String(radarFrameIndex);
      const bitmap = await renderRadarFrame(frame);
      sizeCanvas(radarCanvas);
      radarCtx.clearRect(0, 0, radarCanvas.width, radarCanvas.height);
      radarCtx.drawImage(bitmap, 0, 0, radarCanvas.width / (window.devicePixelRatio || 1), radarCanvas.height / (window.devicePixelRatio || 1));
      status.textContent = `雷達回波：${formatRadarTime(frame.time)} (${radarFrameIndex + 1}/${radarFrames.length})`;
      preloadRadarFrame(radarFrameIndex + 1);
    }
    function preloadRadarFrame(index) {
      if (!radarFrames.length) return Promise.resolve();
      const frame = radarFrames[(index + radarFrames.length) % radarFrames.length];
      return Promise.all(visibleTiles().map((tile) => loadRadarTile(frame, tile)));
    }
    function stopRadarAnimation() {
      if (radarTimer) {
        clearTimeout(radarTimer);
        radarTimer = null;
      }
      radarPlay.classList.remove("active");
      radarPlay.textContent = "播放回波";
    }
    function queueNextRadarFrame() {
      radarTimer = window.setTimeout(async () => {
        await drawRadarFrame((radarFrameIndex + 1) % radarFrames.length);
        if (radarTimer) queueNextRadarFrame();
      }, 500);
    }
    function startRadarAnimation() {
      stopRadarAnimation();
      radarPlay.classList.add("active");
      radarPlay.textContent = "暫停回波";
      queueNextRadarFrame();
    }
    async function toggleRadarPlayback() {
      if (!radarVisible) {
        try {
          radarPlay.disabled = true;
          await ensureRadarFrames();
          radarVisible = true;
          await drawRadarFrame(radarFrameIndex);
          startRadarAnimation();
        } catch (error) {
          console.error(error);
          status.textContent = "雷達回波載入失敗";
        } finally {
          radarPlay.disabled = false;
        }
        return;
      }
      if (radarTimer) {
        stopRadarAnimation();
      } else {
        startRadarAnimation();
      }
    }
    function tileUrl(frame, product, z, x, y) {
      return `https://www.jma.go.jp/bosai/himawari/data/satimg/${frame.basetime}/fd/${frame.validtime}/${product}/${z}/${x}/${y}.jpg`;
    }
    function lngToTileX(lng, z) {
      return Math.floor((lng + 180) / 360 * Math.pow(2, z));
    }
    function latToTileY(lat, z) {
      const rad = lat * Math.PI / 180;
      return Math.floor((1 - Math.log(Math.tan(rad) + 1 / Math.cos(rad)) / Math.PI) / 2 * Math.pow(2, z));
    }
    function tileXToLng(x, z) {
      return x / Math.pow(2, z) * 360 - 180;
    }
    function tileYToLat(y, z) {
      const n = Math.PI - 2 * Math.PI * y / Math.pow(2, z);
      return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
    }
    function visibleTiles() {
      const bounds = map.getBounds();
      const max = Math.pow(2, tileZoom) - 1;
      const xMin = Math.max(0, lngToTileX(bounds.getWest(), tileZoom) - 1);
      const xMax = Math.min(max, lngToTileX(bounds.getEast(), tileZoom) + 1);
      const yMin = Math.max(0, latToTileY(bounds.getNorth(), tileZoom) - 1);
      const yMax = Math.min(max, latToTileY(bounds.getSouth(), tileZoom) + 1);
      const tiles = [];
      for (let x = xMin; x <= xMax; x++) {
        for (let y = yMin; y <= yMax; y++) tiles.push({ x, y, z: tileZoom });
      }
      return tiles;
    }
    function loadTile(frame, product, tile) {
      const url = tileUrl(frame, product, tile.z, tile.x, tile.y);
      const key = `${frame.validtime}:${product}:${tile.z}:${tile.x}:${tile.y}`;
      if (frameCache.has(key)) return Promise.resolve(frameCache.get(key));
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          frameCache.set(key, img);
          resolve(img);
        };
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }
    function sizeCanvas(target) {
      const size = map.getSize();
      const dpr = window.devicePixelRatio || 1;
      target.width = Math.max(1, Math.floor(size.x * dpr));
      target.height = Math.max(1, Math.floor(size.y * dpr));
      target.style.width = `${size.x}px`;
      target.style.height = `${size.y}px`;
      const targetCtx = target.getContext("2d");
      targetCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { size, targetCtx };
    }
    async function renderFrame(frame) {
      const offscreen = document.createElement("canvas");
      const { targetCtx } = sizeCanvas(offscreen);
      const tiles = visibleTiles();
      targetCtx.clearRect(0, 0, offscreen.width, offscreen.height);
      const products = [
        { name: "B13/TBB", alpha: 0.72 },
        { name: "B08/TBB", alpha: 0.32 }
      ];
      for (const product of products) {
        targetCtx.globalAlpha = product.alpha;
        for (const tile of tiles) {
          const img = await loadTile(frame, product.name, tile);
          if (!img) continue;
          const west = tileXToLng(tile.x, tile.z);
          const east = tileXToLng(tile.x + 1, tile.z);
          const north = tileYToLat(tile.y, tile.z);
          const south = tileYToLat(tile.y + 1, tile.z);
          const topLeft = map.latLngToContainerPoint([north, west]);
          const bottomRight = map.latLngToContainerPoint([south, east]);
          targetCtx.drawImage(img, topLeft.x, topLeft.y, bottomRight.x - topLeft.x, bottomRight.y - topLeft.y);
        }
      }
      targetCtx.globalAlpha = 1;
      return offscreen;
    }
    async function drawFrame(index) {
      if (!frames.length) return;
      const requestId = renderRequestId + 1;
      renderRequestId = requestId;
      frameIndex = Math.max(0, Math.min(frames.length - 1, index));
      const frame = frames[frameIndex];
      timeline.value = String(frameIndex);
      const bitmap = await renderFrame(frame);
      if (renderRequestId !== requestId) return;
      sizeCanvas(canvas);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(bitmap, 0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));
      status.textContent = `Canvas 厚度感：${formatTime(frame)} (${frameIndex + 1}/${frames.length})`;
      preloadFrame(frameIndex + 1);
    }
    function preloadFrame(index) {
      if (!frames.length) return Promise.resolve();
      const frame = frames[(index + frames.length) % frames.length];
      const tiles = visibleTiles();
      const requests = [];
      ["B13/TBB", "B08/TBB"].forEach((product) => {
        tiles.forEach((tile) => requests.push(loadTile(frame, product, tile)));
      });
      return Promise.all(requests);
    }
    function preloadUpcomingFrames(count = 5) {
      const requests = [];
      for (let offset = 1; offset <= count; offset++) {
        requests.push(preloadFrame(frameIndex + offset));
      }
      const timeout = new Promise((resolve) => window.setTimeout(resolve, 2000));
      return Promise.race([Promise.all(requests), timeout]);
    }
    function setFrame(index) {
      drawFrame(index);
    }
    function stop() {
      playRequestId += 1;
      if (timer) {
        clearTimeout(timer);
        timer = null;
      }
      play.classList.remove("active");
      play.textContent = "播放雲圖";
    }
    function queueNextFrame() {
      timer = window.setTimeout(async () => {
        await drawFrame((frameIndex + 1) % frames.length);
        if (timer) queueNextFrame();
      }, 360);
    }
    async function togglePlay() {
      if (!frames.length) return;
      if (timer) {
        stop();
        return;
      }
      const requestId = playRequestId + 1;
      playRequestId = requestId;
      play.disabled = true;
      play.textContent = "預載中";
      status.textContent = "預載接下來 5 格影像中...";
      await preloadUpcomingFrames(5);
      if (playRequestId !== requestId) return;
      play.disabled = false;
      play.classList.add("active");
      play.textContent = "暫停雲圖";
      queueNextFrame();
    }
    async function init() {
      const response = await fetch(timesUrl, { cache: "no-store" });
      const times = await response.json();
      frames = (Array.isArray(times) ? times : [])
        .map((frame) => ({ ...frame, epoch: parseJmaTime(frame.validtime) }))
        .filter((frame) => frame.basetime && frame.validtime && Number.isFinite(frame.epoch));
      const latestEpoch = frames[frames.length - 1]?.epoch;
      if (Number.isFinite(latestEpoch)) {
        const startEpoch = latestEpoch - historyHours * 60 * 60 * 1000;
        frames = frames.filter((frame) => frame.epoch >= startEpoch);
      }
      if (!frames.length) {
        status.textContent = "向日葵資料目前無法載入";
        return;
      }
      frameIndex = frames.length - 1;
      timeline.min = "0";
      timeline.max = String(frames.length - 1);
      timeline.value = String(frameIndex);
      await drawFrame(frameIndex);
    }
    timeline.addEventListener("input", () => setFrame(Number(timeline.value)));
    radarTimeline.addEventListener("input", () => {
      stopRadarAnimation();
      if (radarVisible) drawRadarFrame(Number(radarTimeline.value));
    });
    typhoonTimeline.addEventListener("input", () => {
      stopTyphoonPlayback();
      drawTyphoonFrame(Number(typhoonTimeline.value));
    });
    map.on("moveend zoomend resize", () => {
      if (frames.length) drawFrame(frameIndex);
      if (radarVisible) drawRadarFrame(radarFrameIndex);
    });
    play.addEventListener("click", togglePlay);
    radarPlay.addEventListener("click", toggleRadarPlayback);
    typhoonPlay.addEventListener("click", toggleTyphoonPlayback);
    typhoonClose.addEventListener("click", closeTyphoonLayer);
    panelToggle.addEventListener("click", () => {
      const collapsed = controlPanel.classList.toggle("collapsed");
      panelToggle.textContent = collapsed ? "展開" : "收合";
    });
    init().catch((error) => {
      console.error(error);
      status.textContent = "向日葵資料載入失敗";
    });
  </script>
</body>
</html>
