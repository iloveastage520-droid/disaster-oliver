<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Disaster Oliver combines located disaster news with a test flood potential overlay.">
  <title>淹水潛勢測試圖 | Disaster Oliver</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="flood-potential">
  <header class="site-header">
    <a class="brand" href="../index.html" aria-label="Disaster Oliver 首頁">
      <span class="brand-mark">DO</span>
      <span class="brand-text">Disaster Oliver</span>
    </a>
    <nav class="site-nav" aria-label="主要導覽">
      <a href="news.html">最新新聞</a>
      <a href="news-map.html">新聞地圖</a>
      <a href="flood-potential.html">淹水潛勢</a>
      <a href="../index.html#dashboard">儀表板</a>
    </nav>
  </header>

  <main>
    <section class="page-hero flood-page-hero" aria-labelledby="flood-title">
      <p class="eyebrow">淹水潛勢圖層</p>
      <h1 id="flood-title">新聞位置與淹水潛勢測試圖</h1>
      <p>
        目前先載入南台灣 24H / 200mm 淹水潛勢測試圖層，驗證 Google Sheet 新聞點位是否能與公開 GIS 圖資疊合。
      </p>
    </section>

    <section class="flood-workspace" aria-label="淹水潛勢測試工作區">
      <aside class="flood-side-panel">
        <div class="section-heading">
          <p class="eyebrow">已定位新聞</p>
          <h2>定位新聞</h2>
        </div>

        <div class="flood-controls">
          <label class="field">
            <span>搜尋</span>
            <input id="flood-search" type="search" placeholder="輸入縣市、媒體或新聞關鍵字">
          </label>
          <label class="check-field">
            <input id="flood-layer-toggle" type="checkbox" checked>
            <span>顯示淹水潛勢測試圖層</span>
          </label>
          <button class="button button-primary" id="flood-refresh" type="button">重新讀取</button>
        </div>

        <div class="flood-summary">
          <div class="metric">
            <span>Located</span>
            <strong id="flood-count">--</strong>
          </div>
          <div class="metric">
            <span>狀態</span>
            <strong id="flood-status">讀取中</strong>
          </div>
        </div>

        <div id="flood-news-list" class="flood-news-list" aria-live="polite"></div>
      </aside>

      <section class="flood-map-panel" aria-label="新聞與淹水潛勢地圖">
        <div id="flood-map" class="flood-map"></div>
        <div class="flood-legend" aria-label="淹水潛勢圖例">
          <strong>測試圖層</strong>
          <span><i class="risk-high"></i>24H / 200mm 淹水潛勢</span>
          <span><i class="risk-mid"></i>新聞點位</span>
        </div>
      </section>
    </section>
  </main>

  <footer class="site-footer">
    <span>Disaster Oliver</span>
    <span>淹水潛勢展示模組</span>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="../js/flood-potential.js"></script>
</body>
</html>
